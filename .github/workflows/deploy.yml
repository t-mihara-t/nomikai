name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Cloudflare Pages project
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create nomikai --production-branch main
        continue-on-error: true

      - name: Create D1 database
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 create nomikai-db
        continue-on-error: true

      - name: Get D1 database ID
        id: d1-info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_ID=$(npx wrangler d1 list --json 2>/dev/null | jq -r '.[] | select(.name == "nomikai-db") | .uuid')
          echo "database_id=$DB_ID" >> "$GITHUB_OUTPUT"
          echo "Database ID: $DB_ID"

      - name: Run D1 schema
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute nomikai-db --remote --file=./schema.sql

      - name: Run D1 migration
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute nomikai-db --remote --file=./migration.sql
        continue-on-error: true

      - name: Configure wrangler.toml with D1 binding
        run: |
          DB_ID="${{ steps.d1-info.outputs.database_id }}"
          printf 'name = "nomikai"\ncompatibility_date = "2024-01-01"\npages_build_output_dir = "./dist"\n\n[[d1_databases]]\nbinding = "DB"\ndatabase_name = "nomikai-db"\ndatabase_id = "%s"\n' "$DB_ID" > wrangler.toml
          echo "wrangler.toml configured with database_id: $DB_ID"
          cat wrangler.toml

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nomikai --branch main
