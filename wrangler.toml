name = "nomikai"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./dist"

# D1データベースバインディング
# ローカル開発時は wrangler pages dev で自動的にローカルD1が使用されます
# 本番環境ではGitHub Actionsのデプロイ時に --d1 フラグで自動設定されます
# ローカルで明示的に設定する場合は database_id を設定してください
# [[d1_databases]]
# binding = "DB"
# database_name = "nomikai-db"
# database_id = "YOUR_DATABASE_ID_HERE"
